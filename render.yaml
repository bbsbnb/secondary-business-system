services:
  - type: web
    name: secondary-business-system-api
    runtime: docker
    plan: free
    branch: master
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: secondary-business-system-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false

  - type: web
    name: secondary-business-system-web
    runtime: static
    plan: free
    branch: master
    buildCommand: cd frontend && npm install && node ./node_modules/vite/bin/vite.js build
    staticPublishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://secondary-business-system-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: secondary-business-system-db
    databaseName: secondary_business_system
    user: secondary_business_system_user
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
